<p align="left"><b><font color="#00CC99" size="4">Il Reame Elfico Erlin
rappresenta la più antica forma statuale di Arelia. Il Reame è una monarchia
ereditaria strutturata in clan. Il </font><i><font size="4" color="#FF9933">Clan
della Corona Reale</font></i><font color="#00CC99" size="4"> è quello della
famiglia Reale, si narra che è il clan i cui membri hanno la discendenza più
vicino con i primi elfi scesi dall'Altopiano.</font></b></p>
